name: Daily Opportunity Scraper

on:
  schedule:
    - cron: '0 0 * * *' # Runs once every day at 12:00 AM UTC (5:30 AM IST)
  workflow_dispatch: # Allows you to run this manually from the GitHub actions tab

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the project code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'


      # 3. Install packages
      - name: Install Dependencies
        run: npm ci

      # 4. Run the import script using secrets
      - name: Run Scraper
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node js/import_data.js

      # 5. Run the link validator script using secrets
      - name: Run Link Validator
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node js/validate_links.js

