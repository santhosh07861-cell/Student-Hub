<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="One Platform. Endless Opportunities. Elevating students' potential through smart matching algorithms, tailored courses, and career blueprints.">
  <title>StudentHub - Student Career Portal</title>
  <script>
    if (window.location.port !== '5173' && window.location.port !== '5174') {
      const path = window.location.pathname;
      if (!path.includes('/dist/')) {
        if (path.endsWith('/') || path.endsWith('/index.html')) {
          const target = path.substring(0, path.lastIndexOf('/')) + '/dist/index.html';
          window.location.pathname = target;
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
