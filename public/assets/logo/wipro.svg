<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="14" fill="#ffffff"/>
  <!-- Multi-color dots in circular grids -->
  <circle cx="50" cy="50" r="10" fill="#4B0082"/>
  <circle cx="50" cy="30" r="4" fill="#ff4e00"/>
  <circle cx="50" cy="70" r="4" fill="#008000"/>
  <circle cx="30" cy="50" r="4" fill="#0000ff"/>
  <circle cx="70" cy="50" r="4" fill="#ffa500"/>
  <circle cx="36" cy="36" r="4" fill="#ee82ee"/>
  <circle cx="64" cy="64" r="4" fill="#ff0000"/>
  <circle cx="36" cy="64" r="4" fill="#40e0d0"/>
  <circle cx="64" cy="36" r="4" fill="#800080"/>
  <!-- Outer dotted boundary rings -->
  <circle cx="50" cy="50" r="32" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4 4"/>
</svg>
